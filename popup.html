<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 320px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      margin: 0;
    }

    h1 {
      font-size: 15px;
      margin: 0 0 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    h1 .icon {
      font-size: 18px;
    }

    .page-info {
      background: #f5f5f5;
      border-radius: 6px;
      padding: 10px;
      margin-bottom: 12px;
      word-break: break-word;
    }

    .page-info .title {
      font-weight: 600;
      margin-bottom: 4px;
      line-height: 1.3;
    }

    .page-info .url {
      color: #666;
      font-size: 11px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .filename-row {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .filename-row input {
      flex: 1;
      padding: 6px 8px;
      border: 1px solid #ccc;
      border-radius: 4px;
      font-size: 12px;
      font-family: monospace;
    }

    .filename-row .ext {
      padding: 6px 0;
      color: #666;
      font-size: 12px;
      font-family: monospace;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    button:hover {
      background: #1557b0;
    }

    button:disabled {
      background: #94b8e8;
      cursor: not-allowed;
    }

    .status {
      margin-top: 10px;
      padding: 8px 10px;
      border-radius: 6px;
      font-size: 12px;
      display: none;
    }

    .status.working {
      display: block;
      background: #e8f0fe;
      color: #1a73e8;
    }

    .status.success {
      display: block;
      background: #e6f4ea;
      color: #137333;
    }

    .status.error {
      display: block;
      background: #fce8e6;
      color: #c5221f;
    }
  </style>
</head>
<body>
  <h1><span class="icon">&#128195;</span> PKDB Page Capture</h1>

  <div class="page-info">
    <div class="title" id="pageTitle">Loading...</div>
    <div class="url" id="pageUrl"></div>
  </div>

  <div class="filename-row">
    <input type="text" id="filename" placeholder="filename">
    <span class="ext">.pdf</span>
  </div>

  <button id="captureBtn">Capture & Upload to Scans</button>

  <div class="status" id="status"></div>

  <script src="popup.js"></script>
</body>
</html>
